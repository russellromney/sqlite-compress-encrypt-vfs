app = "cinch-tiered-bench"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "warn"

[mounts]
  source = "bench_data"
  destination = "/data"

[processes]
  app = "--sizes 1000000 --iterations 10 --skip-verify --modes none,interior,index,data"

[[vm]]
  size = "performance-8x"
  memory = "16384"
